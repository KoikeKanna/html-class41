}

.articles {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3列 */
    gap: 20px; /* 間隔 */
}

.articles a:nth-child(4) {
    grid-column: 2;
}

.articles a:nth-child(6) {
    grid-column: 2;
}

.article-card {
    border: 1px solid #ddd;
    padding: 10px;
}

/* 店舗一覧 */
.store-list {
    display: grid;
    grid-template-columns: repeat(3, minmax(250px,1fr));
    gap: 10px;
    padding: 10px;
}

.store {
    background: white;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

/* 詳細 */
.detail {
    padding: 15px;
    background: white;
    margin: 10px;
    border-radius: 10px;
}

// 検索
function search() {
    document.getElementById("topPage").style.display = "none";

    const keyword = document.getElementById("keyword").value;
    const genre = document.getElementById("genre").value;
    const price = document.getElementById("price").value;

    const result = stores.filter(store => {
        return (
            store.name.includes(keyword) &&
            (genre === "" || store.genre === genre) &&
            (price === "" || store.price <= price)
        );
    });

    displayList(result);
}

// 一覧表示
function displayList(data) {
    const list = document.getElementById("listPage");
    list.innerHTML = "";

    data.forEach(store => {
        list.innerHTML += `
            <div class="store" onclick="showDetail(${store.id})">
                <h3>${store.name}</h3>
                <p>${store.genre} / ${store.price}円</p>
            </div>
        `;
    });
}

// 詳細
function showDetail(id) {
    const stores = stores.find(s => s.id === id);

    document.getElementById("detailPage").innerHTML = `
        <h2>${store.name}</h2>
        <p>金額: ${getPriceLabel(store.price)}</p>
        <p>住所: ${store.address}</p>
        <p>電話: ${store.phone}</p>
        <p>地図: ${store.map}
    `;
}

// スライダー自動ループ
const slider = document.querySelector(".slider");

let scrollAmount = 0;

function autoSlide() {
    scrollAmount += 1; // スクロール速度

    slider.scrollLeft = scrollAmount;

    // 一番右まで行ったら最初に戻る
    if (scrollAmount >= slider.scrollWidth - slider.clientWidth) {
        scrollAmount = 0;
    }
}

// 30msごとに動かす（速さ調整OK）
setInterval(autoSlide, 30);
``

const track = document.getElementById("sliderTrack");

let pos = 0;
const speed = 0.5; // ←スピード調整（小さいほどゆっくり）

function animate() {
    pos += speed;

    // ✅ 半分まで来たら戻す（でも見た目は連続）
    if (pos >= track.scrollWidth / 2) {
        pos = 0;
    }

    track.style.transform = `translateX(${-pos}px)`;

    requestAnimationFrame(animate);
}

animate();
